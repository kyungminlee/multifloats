# Composite action: build the Sphinx + Breathe + MyST documentation
# (Doxygen XML -> Sphinx HTML) into doc/_build/html via ./doc/build.sh.
#
# Shared by docs.yml (GitHub Pages publish) and ci.yml (per-push docs
# build check) so the build recipe cannot drift between the two. The
# caller must check out the repository first.

name: Build docs
description: Build the Sphinx documentation into doc/_build/html

runs:
  using: composite
  steps:
    - name: Install Doxygen
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y doxygen

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install docs dependencies
      shell: bash
      run: |
        uv venv doc/.venv
        uv pip install --python doc/.venv -r doc/requirements.txt

    - name: Build docs (Doxygen XML -> Sphinx HTML)
      shell: bash
      run: ./doc/build.sh
