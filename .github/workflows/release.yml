name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Release artifacts target the Haswell baseline (AVX2 + FMA + BMI2).
# Exported as CFLAGS/CXXFLAGS/FFLAGS so CMake seeds CMAKE_<LANG>_FLAGS
# from them — applied at compile AND link, which -flto needs.
env:
  CFLAGS: -march=haswell
  CXXFLAGS: -march=haswell
  FFLAGS: -march=haswell

jobs:
  # ===========================================================================
  # LTO build — per-compiler matrix.
  #
  # Both libraries (multifloats C++ and multifloatsf Fortran) are built with
  # LTO. Each matrix entry produces compiler-tagged archives that can coexist
  # in one install prefix:
  #   libmultifloats-<cxx-tag>.a       (e.g. libmultifloats-gcc-15.a)
  #   libmultifloatsf-<ftn-tag>.a      (e.g. libmultifloatsf-gfortran-15.a)
  # The smart Config.cmake on the consumer side picks the matching one.
  # ===========================================================================
  build-lto:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # GCC / gfortran
          - compiler: gcc
            version: "12"
            cc: gcc-12
            cxx: g++-12
            fc: gfortran-12
          - compiler: gcc
            version: "13"
            cc: gcc-13
            cxx: g++-13
            fc: gfortran-13
          - compiler: gcc
            version: "14"
            cc: gcc-14
            cxx: g++-14
            fc: gfortran-14
          - compiler: gcc
            version: "15"
            cc: gcc-15
            cxx: g++-15
            fc: gfortran-15

          # LLVM Flang (matched C/C++ from same LLVM version)
          - compiler: llvm
            version: "19"
            cc: clang-19
            cxx: clang++-19
            fc: flang-new-19
          - compiler: llvm
            version: "20"
            cc: clang-20
            cxx: clang++-20
            fc: flang-new-20
          - compiler: llvm
            version: "21"
            cc: clang-21
            cxx: clang++-21
            fc: flang-new-21

          # Intel oneAPI
          - compiler: intel
            version: "2023.2.0"
            cc: icx
            cxx: icpx
            fc: ifx
            oneapi_pkg: intel-oneapi-compiler-fortran-2023.2.0 intel-oneapi-compiler-dpcpp-cpp-2023.2.0
          - compiler: intel
            version: "2024.1"
            cc: icx
            cxx: icpx
            fc: ifx
            oneapi_pkg: intel-oneapi-compiler-fortran-2024.1 intel-oneapi-compiler-dpcpp-cpp-2024.1
          - compiler: intel
            version: "2024.2"
            cc: icx
            cxx: icpx
            fc: ifx
            oneapi_pkg: intel-oneapi-compiler-fortran-2024.2 intel-oneapi-compiler-dpcpp-cpp-2024.2
          - compiler: intel
            version: "2025.0"
            cc: icx
            cxx: icpx
            fc: ifx
            oneapi_pkg: intel-oneapi-compiler-fortran-2025.0 intel-oneapi-compiler-dpcpp-cpp-2025.0

    steps:
      - uses: actions/checkout@v4

      - name: Install fypp and mpmath
        run: pip install fypp mpmath

      # --- GCC ---
      - name: Install GCC ${{ matrix.version }}
        if: matrix.compiler == 'gcc'
        run: |
          # gcc-15 is not in Ubuntu 24.04 default repos; pull from toolchain PPA
          if [ "${{ matrix.version }}" = "15" ]; then
            sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          fi
          sudo apt-get update
          sudo apt-get install -y gcc-${{ matrix.version }} g++-${{ matrix.version }} gfortran-${{ matrix.version }}

      # --- LLVM / Flang ---
      - name: Install LLVM ${{ matrix.version }}
        if: matrix.compiler == 'llvm'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          . /etc/os-release
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-${{ matrix.version }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-${{ matrix.version }} flang-${{ matrix.version }} lld-${{ matrix.version }}
          # Ensure flang-new-<ver> symlink exists
          if ! command -v flang-new-${{ matrix.version }} &>/dev/null; then
            sudo ln -sf $(which flang-${{ matrix.version }}) /usr/bin/flang-new-${{ matrix.version }}
          fi

      # --- Intel oneAPI ---
      - name: Install Intel oneAPI
        if: matrix.compiler == 'intel'
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | sudo gpg --dearmor -o /usr/share/keyrings/intel.gpg
          echo "deb [signed-by=/usr/share/keyrings/intel.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/intel-oneapi.list
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.oneapi_pkg }}

      - name: Configure
        run: |
          if [ "${{ matrix.compiler }}" = "intel" ]; then
            source /opt/intel/oneapi/setvars.sh 2>/dev/null || true
          fi
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_Fortran_COMPILER=${{ matrix.fc }} \
            -DMULTIFLOATS_USE_LTO=ON \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install

      # GCC matrix entries build everything (libraries + test executables);
      # tests run below. Non-GCC entries build only the two installable
      # libraries — the C++ test executables include <quadmath.h> (the GCC
      # libquadmath header) and tap GCC-only `-fext-numeric-literals`, so
      # they don't compile under clang/icpx on the current CI image.
      # icpx and modern clang *do* support `__float128` (binary-compatible
      # with GCC); enabling test parity would mean apt-installing
      # `libquadmath-dev` and propagating `-fp-model=precise` to the test
      # targets — deferred.
      - name: Build everything (C++ + Fortran + tests)
        if: matrix.compiler == 'gcc'
        run: cmake --build build -j$(nproc)

      - name: Build libraries only
        if: matrix.compiler != 'gcc'
        run: cmake --build build --target multifloats --target multifloatsf -j$(nproc)

      - name: Test
        if: matrix.compiler == 'gcc'
        run: cd build && ctest --output-on-failure -j$(nproc)

      - name: Install (C++ + Fortran)
        run: cmake --install build

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="multifloats-${TAG}-linux-x86_64-lto-${{ matrix.compiler }}-${{ matrix.version }}.tar.gz"
          tar czf "${ARCHIVE}" -C install .
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: multifloats-lto-${{ matrix.compiler }}-${{ matrix.version }}
          path: ${{ env.ARCHIVE }}

  # ===========================================================================
  # Non-LTO build — single C++-only build.
  #
  # No bytecode in the archive, so libmultifloats.a links against any
  # compiler/version. Acts as the portable fallback when the consumer's
  # compiler doesn't match any of the per-compiler LTO entries above.
  # No Fortran build here: a Fortran consumer is always tied to a specific
  # gfortran/flang/ifx .mod format, so the LTO-tagged Fortran libraries
  # already cover every reachable Fortran consumer.
  # ===========================================================================
  build-non-lto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install fypp and mpmath
        run: pip install fypp mpmath

      - name: Configure & build
        run: |
          # MULTIFLOATS_STRIP_SYMBOLS=OFF: the localize_symbols.sh
          # post-build hook (objcopy --keep-global-symbols + strip
          # --strip-unneeded) damages COMDAT-grouped hidden namespace
          # functions like `multifloats::hypot`, which GNU ld then
          # discards. The strip is correct for LTO archives (call
          # sites inline before strip runs); it is wrong for non-LTO
          # archives where the C++ namespace API must remain
          # link-resolvable. Disable just for this job.
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_Fortran_COMPILER=gfortran-14 \
            -DMULTIFLOATS_USE_LTO=OFF \
            -DMULTIFLOATS_STRIP_SYMBOLS=OFF \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
          cmake --build build -j$(nproc)

      - name: Test
        run: cd build && ctest --output-on-failure -j$(nproc)

      - name: Install C++ only
        run: cmake --install build --component Unspecified

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="multifloats-${TAG}-linux-x86_64-no-lto.tar.gz"
          tar czf "${ARCHIVE}" -C install .
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: multifloats-no-lto
          path: ${{ env.ARCHIVE }}

  # ===========================================================================
  # Create GitHub Release with all artifacts
  # ===========================================================================
  release:
    needs: [build-lto, build-non-lto]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Merge all installs into a single combined tarball. The per-compiler
      # tagged C++ and Fortran archives coexist by name; the non-LTO
      # libmultifloats.a sits alongside them as the portable fallback.
      # multifloatsConfig.cmake is the smart selector — same content from
      # every per-compiler install, so last-write-wins is safe.
      - name: Create combined archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p combined
          for tarball in artifacts/**/*.tar.gz; do
            tar xzf "$tarball" -C combined
          done
          COMBINED="libmultifloats-${TAG}-linux-x86_64.tar.gz"
          tar czf "${COMBINED}" -C combined .
          echo "COMBINED=${COMBINED}" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.COMBINED }}
            artifacts/**/*.tar.gz
          generate_release_notes: true
