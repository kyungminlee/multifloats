name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Per-job CPU baseline:
#   Linux x86_64 → -march=haswell  (AVX2 + FMA + BMI2)
#   macOS arm64  → -mcpu=apple-m1  (Apple Silicon baseline; M2/M3/M4 are supersets)
# Set at the job level instead of workflow level so the macOS arm64 jobs
# don't inherit a now-illegal -march=haswell flag.

jobs:
  # ===========================================================================
  # LTO build — per-compiler matrix.
  #
  # Both libraries (multifloats C++ and multifloatsf Fortran) are built with
  # LTO. Each matrix entry produces compiler-tagged archives that can coexist
  # in one install prefix:
  #   libmultifloats-<cxx-tag>.a       (e.g. libmultifloats-gcc-15.a)
  #   libmultifloatsf-<ftn-tag>.a      (e.g. libmultifloatsf-gfortran-15.a)
  # The smart Config.cmake on the consumer side picks the matching one.
  # ===========================================================================
  build-lto:
    runs-on: ubuntu-latest
    env:
      CFLAGS: -march=haswell
      CXXFLAGS: -march=haswell
      FFLAGS: -march=haswell
    strategy:
      fail-fast: false
      matrix:
        include:
          # GCC / gfortran
          - compiler: gcc
            version: "12"
            cc: gcc-12
            cxx: g++-12
            fc: gfortran-12
          - compiler: gcc
            version: "13"
            cc: gcc-13
            cxx: g++-13
            fc: gfortran-13
          - compiler: gcc
            version: "14"
            cc: gcc-14
            cxx: g++-14
            fc: gfortran-14
          - compiler: gcc
            version: "15"
            cc: gcc-15
            cxx: g++-15
            fc: gfortran-15

          # LLVM Flang (matched C/C++ from same LLVM version)
          - compiler: llvm
            version: "19"
            cc: clang-19
            cxx: clang++-19
            fc: flang-new-19
          - compiler: llvm
            version: "20"
            cc: clang-20
            cxx: clang++-20
            fc: flang-new-20
          - compiler: llvm
            version: "21"
            cc: clang-21
            cxx: clang++-21
            fc: flang-new-21

          # Intel oneAPI
          - compiler: intel
            version: "2023.2.0"
            cc: icx
            cxx: icpx
            fc: ifx
            oneapi_pkg: intel-oneapi-compiler-fortran-2023.2.0 intel-oneapi-compiler-dpcpp-cpp-2023.2.0
          - compiler: intel
            version: "2024.1"
            cc: icx
            cxx: icpx
            fc: ifx
            oneapi_pkg: intel-oneapi-compiler-fortran-2024.1 intel-oneapi-compiler-dpcpp-cpp-2024.1
          - compiler: intel
            version: "2024.2"
            cc: icx
            cxx: icpx
            fc: ifx
            oneapi_pkg: intel-oneapi-compiler-fortran-2024.2 intel-oneapi-compiler-dpcpp-cpp-2024.2
          - compiler: intel
            version: "2025.0"
            cc: icx
            cxx: icpx
            fc: ifx
            oneapi_pkg: intel-oneapi-compiler-fortran-2025.0 intel-oneapi-compiler-dpcpp-cpp-2025.0

    steps:
      - uses: actions/checkout@v4

      - name: Install fypp and mpmath
        run: pip install fypp mpmath

      # --- GCC ---
      - name: Install GCC ${{ matrix.version }}
        if: matrix.compiler == 'gcc'
        run: |
          # gcc-15 is not in Ubuntu 24.04 default repos; pull from toolchain PPA
          if [ "${{ matrix.version }}" = "15" ]; then
            sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          fi
          sudo apt-get update
          sudo apt-get install -y gcc-${{ matrix.version }} g++-${{ matrix.version }} gfortran-${{ matrix.version }}

      # --- LLVM / Flang ---
      - name: Install LLVM ${{ matrix.version }}
        if: matrix.compiler == 'llvm'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          . /etc/os-release
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-${{ matrix.version }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-${{ matrix.version }} flang-${{ matrix.version }} lld-${{ matrix.version }}
          # Ensure flang-new-<ver> symlink exists
          if ! command -v flang-new-${{ matrix.version }} &>/dev/null; then
            sudo ln -sf $(which flang-${{ matrix.version }}) /usr/bin/flang-new-${{ matrix.version }}
          fi

      # --- Intel oneAPI ---
      - name: Install Intel oneAPI
        if: matrix.compiler == 'intel'
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | sudo gpg --dearmor -o /usr/share/keyrings/intel.gpg
          echo "deb [signed-by=/usr/share/keyrings/intel.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/intel-oneapi.list
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.oneapi_pkg }}

      - name: Configure
        run: |
          if [ "${{ matrix.compiler }}" = "intel" ]; then
            source /opt/intel/oneapi/setvars.sh 2>/dev/null || true
          fi
          # MULTIFLOATS_BUILD_BENCH=OFF: CI doesn't run microbenchmarks
          # and the Fortran bench source uses gfortran-13+-only
          # `!GCC$ ATTRIBUTES NOINLINE` (would break gcc-12). Saves
          # build time on all matrix entries.
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_Fortran_COMPILER=${{ matrix.fc }} \
            -DMULTIFLOATS_USE_LTO=ON \
            -DMULTIFLOATS_BUILD_BENCH=OFF \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install

      # GCC matrix entries build everything (libraries + test executables);
      # tests run below. Non-GCC entries build only the two installable
      # libraries — the C++ test executables include <quadmath.h> (the GCC
      # libquadmath header) and tap GCC-only `-fext-numeric-literals`, so
      # they don't compile under clang/icpx on the current CI image.
      # icpx and modern clang *do* support `__float128` (binary-compatible
      # with GCC); enabling test parity would mean apt-installing
      # `libquadmath-dev` and propagating `-fp-model=precise` to the test
      # targets — deferred.
      - name: Build everything (C++ + Fortran + tests)
        if: matrix.compiler == 'gcc'
        run: cmake --build build -j$(nproc)

      - name: Build libraries only
        if: matrix.compiler != 'gcc'
        run: cmake --build build --target multifloats --target multifloatsf -j$(nproc)

      - name: Test
        if: matrix.compiler == 'gcc'
        run: cd build && ctest --output-on-failure -j$(nproc)

      - name: Install (C++ + Fortran)
        run: cmake --install build

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="multifloats-${TAG}-linux-x86_64-lto-${{ matrix.compiler }}-${{ matrix.version }}.tar.gz"
          tar czf "${ARCHIVE}" -C install .
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: multifloats-lto-${{ matrix.compiler }}-${{ matrix.version }}
          path: ${{ env.ARCHIVE }}

  # ===========================================================================
  # macOS arm64 LTO matrix.
  #
  # Homebrew GCC for full builds (library + tests + Fortran). Apple Clang
  # for a C++-library-only build — Apple Clang lacks __float128 / libquadmath
  # (the test scaffolding's high-precision oracle), so its tests can't
  # compile, but the library itself is fine. Apple Clang is the default
  # macOS C++ compiler, so the tagged `libmultifloats-appleclang-N.a`
  # archive is the natural artifact for Mac consumers using the system
  # toolchain.
  #
  # No LLVM Flang / Homebrew LLVM here: Apple Silicon has no usable
  # quadmath path for tests either, and Homebrew LLVM on macOS is a
  # niche choice. Add later if a real user asks.
  # ===========================================================================
  build-lto-mac:
    runs-on: macos-15
    env:
      CFLAGS: -mcpu=apple-m1
      CXXFLAGS: -mcpu=apple-m1
      FFLAGS: -mcpu=apple-m1
    strategy:
      fail-fast: false
      matrix:
        include:
          # Homebrew GCC — full build (library + Fortran + tests on the
          # newest only, to keep the matrix fast).
          - compiler: gcc
            version: "13"
            brew_pkg: gcc@13
            cc: gcc-13
            cxx: g++-13
            fc: gfortran-13
            run_tests: false
          - compiler: gcc
            version: "14"
            brew_pkg: gcc@14
            cc: gcc-14
            cxx: g++-14
            fc: gfortran-14
            run_tests: false
          - compiler: gcc
            version: "15"
            brew_pkg: gcc@15
            cc: gcc-15
            cxx: g++-15
            fc: gfortran-15
            run_tests: true

          # Apple Clang — C++ library only (skip Fortran target + all
          # tests). Use whatever Apple Clang ships on macos-15; the
          # OUTPUT_NAME tag (`appleclang-<major>`) records the version.
          # Homebrew gfortran-15 is still installed so CMake's Fortran
          # language probe at configure time succeeds — we just don't
          # build the multifloatsf target. Homebrew's gcc formula
          # installs versioned binaries only (`gfortran-15`, no
          # unversioned `gfortran`), so we name the version-suffixed
          # binary explicitly.
          - compiler: appleclang
            version: system
            brew_pkg: gcc@15
            cc: clang
            cxx: clang++
            fc: gfortran-15
            run_tests: false

    steps:
      - uses: actions/checkout@v4

      - name: Install fypp + toolchain
        run: |
          # uv: dd_constants_up_to_date prefers `uv run --with mpmath
          # python3 ...`, so installing uv sidesteps macOS's
          # PEP-668-protected system Python (where `pip install mpmath`
          # silently goes to a different interpreter than ctest invokes).
          # uv tool install fypp puts the fypp CLI on PATH without
          # touching the system Python at all.
          brew install uv ${{ matrix.brew_pkg }}
          uv tool install fypp

      - name: Configure
        run: |
          # MULTIFLOATS_STRIP_SYMBOLS=OFF for Apple Clang: the LTO
          # bitcode .o files inside the archive are opaque to the
          # standard nm/nmedit toolchain that localize_symbols.sh
          # uses to build its keep-list. The script then asks nmedit
          # to re-export symbols that don't visibly exist in the
          # archive, which errors out. Disable the strip step for
          # this entry; consumers using Apple Clang will see all
          # the demangled namespace symbols, which is fine for a
          # niche-toolchain artifact.
          STRIP_FLAG="-DMULTIFLOATS_STRIP_SYMBOLS=ON"
          if [ "${{ matrix.compiler }}" = "appleclang" ]; then
            STRIP_FLAG="-DMULTIFLOATS_STRIP_SYMBOLS=OFF"
          fi
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_Fortran_COMPILER=${{ matrix.fc }} \
            -DMULTIFLOATS_USE_LTO=ON \
            -DMULTIFLOATS_BUILD_BENCH=OFF \
            $STRIP_FLAG \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install

      # Apple Clang: build only the C++ library (Apple Clang has no
      # libquadmath, so test scaffolding doesn't compile and the
      # Fortran library would be redundant with the gcc-N matrix entries).
      - name: Build (Apple Clang — C++ library only)
        if: matrix.compiler == 'appleclang'
        run: cmake --build build --target multifloats -j$(sysctl -n hw.ncpu)

      # GCC: build everything.
      - name: Build (GCC — C++ + Fortran + tests)
        if: matrix.compiler == 'gcc'
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Test
        if: matrix.run_tests
        run: cd build && ctest --output-on-failure -j$(sysctl -n hw.ncpu)

      # Apple Clang installs only the C++ subproject (multifloats); GCC
      # installs everything. cmake --install with a per-subdirectory
      # scope mirrors the build target choice.
      - name: Install (Apple Clang — C++ only)
        if: matrix.compiler == 'appleclang'
        run: cmake --install build/src

      - name: Install (GCC — C++ + Fortran)
        if: matrix.compiler == 'gcc'
        run: cmake --install build

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="multifloats-${TAG}-darwin-arm64-lto-${{ matrix.compiler }}-${{ matrix.version }}.tar.gz"
          tar czf "${ARCHIVE}" -C install .
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: multifloats-mac-lto-${{ matrix.compiler }}-${{ matrix.version }}
          path: ${{ env.ARCHIVE }}

  # ===========================================================================
  # macOS arm64 non-LTO single C++-only build.
  # ===========================================================================
  build-non-lto-mac:
    runs-on: macos-15
    env:
      CFLAGS: -mcpu=apple-m1
      CXXFLAGS: -mcpu=apple-m1
      FFLAGS: -mcpu=apple-m1
    steps:
      - uses: actions/checkout@v4

      - name: Install fypp + Homebrew GCC 14
        run: |
          # See build-lto-mac for rationale (uv + uv tool install).
          brew install uv gcc@14
          uv tool install fypp

      - name: Configure & build
        run: |
          # Same MULTIFLOATS_STRIP_SYMBOLS=OFF rationale as the Linux
          # build-non-lto job — without LTO inlining, hidden namespace
          # symbols still need to be link-resolvable for downstream
          # consumers of `multifloats::hypot` etc.
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_Fortran_COMPILER=gfortran-14 \
            -DMULTIFLOATS_USE_LTO=OFF \
            -DMULTIFLOATS_STRIP_SYMBOLS=OFF \
            -DMULTIFLOATS_BUILD_BENCH=OFF \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Test
        run: cd build && ctest --output-on-failure -j$(sysctl -n hw.ncpu)

      - name: Install C++ only
        run: cmake --install build/src

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="multifloats-${TAG}-darwin-arm64-no-lto.tar.gz"
          tar czf "${ARCHIVE}" -C install .
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: multifloats-mac-no-lto
          path: ${{ env.ARCHIVE }}

  # ===========================================================================
  # Non-LTO build — single C++-only build.
  #
  # No bytecode in the archive, so libmultifloats.a links against any
  # compiler/version. Acts as the portable fallback when the consumer's
  # compiler doesn't match any of the per-compiler LTO entries above.
  # No Fortran build here: a Fortran consumer is always tied to a specific
  # gfortran/flang/ifx .mod format, so the LTO-tagged Fortran libraries
  # already cover every reachable Fortran consumer.
  # ===========================================================================
  build-non-lto:
    runs-on: ubuntu-latest
    env:
      CFLAGS: -march=haswell
      CXXFLAGS: -march=haswell
      FFLAGS: -march=haswell
    steps:
      - uses: actions/checkout@v4

      - name: Install fypp and mpmath
        run: pip install fypp mpmath

      - name: Configure & build
        run: |
          # MULTIFLOATS_STRIP_SYMBOLS=OFF: the localize_symbols.sh
          # post-build hook (objcopy --keep-global-symbols + strip
          # --strip-unneeded) damages COMDAT-grouped hidden namespace
          # functions like `multifloats::hypot`, which GNU ld then
          # discards. The strip is correct for LTO archives (call
          # sites inline before strip runs); it is wrong for non-LTO
          # archives where the C++ namespace API must remain
          # link-resolvable. Disable just for this job.
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_Fortran_COMPILER=gfortran-14 \
            -DMULTIFLOATS_USE_LTO=OFF \
            -DMULTIFLOATS_STRIP_SYMBOLS=OFF \
            -DMULTIFLOATS_BUILD_BENCH=OFF \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
          cmake --build build -j$(nproc)

      - name: Test
        run: cd build && ctest --output-on-failure -j$(nproc)

      - name: Install C++ only
        run: cmake --install build --component Unspecified

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="multifloats-${TAG}-linux-x86_64-no-lto.tar.gz"
          tar czf "${ARCHIVE}" -C install .
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: multifloats-no-lto
          path: ${{ env.ARCHIVE }}

  # ===========================================================================
  # Create GitHub Release with all artifacts
  # ===========================================================================
  release:
    needs: [build-lto, build-non-lto, build-lto-mac, build-non-lto-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Per-platform combined tarballs. Each merges every per-compiler
      # tagged archive + the portable non-LTO archive into one install
      # prefix; the smart multifloatsConfig.cmake (same content from
      # every job's install, last-write-wins) routes consumers to the
      # best-fit. Linux and macOS get separate combined tarballs because
      # mixing archs in a single prefix would just be confusing.
      - name: Create combined archives
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p combined-linux combined-mac
          # actions/download-artifact@v4 layout is artifacts/<name>/<file>.tar.gz.
          # Sort each tarball into the right per-platform combined dir by
          # the platform tag in its filename.
          for tarball in artifacts/**/*.tar.gz; do
            case "$(basename "$tarball")" in
              *-darwin-*) tar xzf "$tarball" -C combined-mac ;;
              *-linux-*)  tar xzf "$tarball" -C combined-linux ;;
            esac
          done

          COMBINED_LINUX="libmultifloats-${TAG}-linux-x86_64.tar.gz"
          COMBINED_MAC="libmultifloats-${TAG}-darwin-arm64.tar.gz"
          tar czf "${COMBINED_LINUX}" -C combined-linux .
          tar czf "${COMBINED_MAC}" -C combined-mac .
          echo "COMBINED_LINUX=${COMBINED_LINUX}" >> $GITHUB_ENV
          echo "COMBINED_MAC=${COMBINED_MAC}" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.COMBINED_LINUX }}
            ${{ env.COMBINED_MAC }}
            artifacts/**/*.tar.gz
          generate_release_notes: true
