name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Release artifacts target the Haswell baseline (AVX2 + FMA + BMI2).
# Exported as CFLAGS/CXXFLAGS/FFLAGS so CMake seeds CMAKE_<LANG>_FLAGS
# from them — applied at compile AND link, which -flto needs.
env:
  CFLAGS: -march=haswell
  CXXFLAGS: -march=haswell
  FFLAGS: -march=haswell

jobs:
  # ===========================================================================
  # C++ library — built once (compiler-independent ABI)
  # ===========================================================================
  build-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install fypp and mpmath
        run: pip install fypp mpmath

      - name: Configure & build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_Fortran_COMPILER=gfortran-14 \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
          cmake --build build -j$(nproc)

      - name: Test
        run: cd build && ctest --output-on-failure -j$(nproc)

      - name: Install C++ only
        run: cmake --install build --component Unspecified

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="multifloats-${TAG}-linux-x86_64.tar.gz"
          tar czf "${ARCHIVE}" -C install .
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: multifloats-cpp
          path: ${{ env.ARCHIVE }}

  # ===========================================================================
  # Fortran library — per-compiler builds (ABI/mod-format specific)
  # ===========================================================================
  build-fortran:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # GCC / gfortran
          - compiler: gcc
            version: "12"
            cc: gcc-12
            cxx: g++-12
            fc: gfortran-12
          - compiler: gcc
            version: "13"
            cc: gcc-13
            cxx: g++-13
            fc: gfortran-13
          - compiler: gcc
            version: "14"
            cc: gcc-14
            cxx: g++-14
            fc: gfortran-14
          - compiler: gcc
            version: "15"
            cc: gcc-15
            cxx: g++-15
            fc: gfortran-15

          # LLVM Flang (matched C/C++ from same LLVM version)
          - compiler: llvm
            version: "19"
            cc: clang-19
            cxx: clang++-19
            fc: flang-new-19
          - compiler: llvm
            version: "20"
            cc: clang-20
            cxx: clang++-20
            fc: flang-new-20
          - compiler: llvm
            version: "21"
            cc: clang-21
            cxx: clang++-21
            fc: flang-new-21

          # Intel oneAPI
          - compiler: intel
            version: "2023.2.0"
            cc: icx
            cxx: icpx
            fc: ifx
            oneapi_pkg: intel-oneapi-compiler-fortran-2023.2.0 intel-oneapi-compiler-dpcpp-cpp-2023.2.0
          - compiler: intel
            version: "2024.1"
            cc: icx
            cxx: icpx
            fc: ifx
            oneapi_pkg: intel-oneapi-compiler-fortran-2024.1 intel-oneapi-compiler-dpcpp-cpp-2024.1
          - compiler: intel
            version: "2024.2"
            cc: icx
            cxx: icpx
            fc: ifx
            oneapi_pkg: intel-oneapi-compiler-fortran-2024.2 intel-oneapi-compiler-dpcpp-cpp-2024.2
          - compiler: intel
            version: "2025.0"
            cc: icx
            cxx: icpx
            fc: ifx
            oneapi_pkg: intel-oneapi-compiler-fortran-2025.0 intel-oneapi-compiler-dpcpp-cpp-2025.0

    steps:
      - uses: actions/checkout@v4

      - name: Install fypp and mpmath
        run: pip install fypp mpmath

      # --- GCC ---
      - name: Install GCC ${{ matrix.version }}
        if: matrix.compiler == 'gcc'
        run: |
          # gcc-15 is not in Ubuntu 24.04 default repos; pull from toolchain PPA
          if [ "${{ matrix.version }}" = "15" ]; then
            sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          fi
          sudo apt-get update
          sudo apt-get install -y gcc-${{ matrix.version }} g++-${{ matrix.version }} gfortran-${{ matrix.version }}

      # --- LLVM / Flang ---
      - name: Install LLVM ${{ matrix.version }}
        if: matrix.compiler == 'llvm'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          . /etc/os-release
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-${{ matrix.version }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-${{ matrix.version }} flang-${{ matrix.version }} lld-${{ matrix.version }}
          # Ensure flang-new-<ver> symlink exists
          if ! command -v flang-new-${{ matrix.version }} &>/dev/null; then
            sudo ln -sf $(which flang-${{ matrix.version }}) /usr/bin/flang-new-${{ matrix.version }}
          fi

      # --- Intel oneAPI ---
      - name: Install Intel oneAPI
        if: matrix.compiler == 'intel'
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | sudo gpg --dearmor -o /usr/share/keyrings/intel.gpg
          echo "deb [signed-by=/usr/share/keyrings/intel.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/intel-oneapi.list
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.oneapi_pkg }}

      # --- Build Fortran library only ---
      - name: Configure
        run: |
          if [ "${{ matrix.compiler }}" = "intel" ]; then
            source /opt/intel/oneapi/setvars.sh 2>/dev/null || true
          fi
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_Fortran_COMPILER=${{ matrix.fc }} \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install

      - name: Build Fortran library
        run: cmake --build build --target multifloatsf -j$(nproc)

      - name: Install Fortran library
        run: |
          # Install just the Fortran subproject outputs
          cmake --install build/fsrc

      # --- Test (GCC only) ---
      - name: Test
        if: matrix.compiler == 'gcc'
        run: |
          cmake --build build --target fortran_fuzz -j$(nproc)
          cd build && ./fortran_fuzz

      # --- Package ---
      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="multifloatsf-${TAG}-linux-x86_64-${{ matrix.compiler }}-${{ matrix.version }}.tar.gz"
          tar czf "${ARCHIVE}" -C install .
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: multifloatsf-${{ matrix.compiler }}-${{ matrix.version }}
          path: ${{ env.ARCHIVE }}

  # ===========================================================================
  # Create GitHub Release with all artifacts
  # ===========================================================================
  release:
    needs: [build-cpp, build-fortran]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Merge all per-compiler installs into a single combined tarball.
      # Files are laid out so multiple compiler variants coexist (each has
      # its own library name, .mod path, and cmake targets file).
      - name: Create combined archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p combined
          for tarball in artifacts/**/*.tar.gz; do
            tar xzf "$tarball" -C combined
          done
          COMBINED="libmultifloats-${TAG}-linux-x86_64.tar.gz"
          tar czf "${COMBINED}" -C combined .
          echo "COMBINED=${COMBINED}" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.COMBINED }}
            artifacts/**/*.tar.gz
          generate_release_notes: true
