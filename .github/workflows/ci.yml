name: CI

# Runs on every PR and every push to main. One Linux (GCC 14) and one
# macOS (Homebrew GCC 14) job so the signal stays fast while still
# catching Mach-O-specific regressions (e.g. __attribute__((alias))
# behavior that differs from ELF). The release workflow (release.yml,
# gated on v* tags) covers the full compiler matrix.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install fypp and mpmath
        run: pip install fypp mpmath

      - name: Install GCC 14
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14 gfortran-14

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_Fortran_COMPILER=gfortran-14

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)

  build-and-test-mac:
    runs-on: macos-15
    env:
      CFLAGS: -mcpu=apple-m1
      CXXFLAGS: -mcpu=apple-m1
      FFLAGS: -mcpu=apple-m1
    steps:
      - uses: actions/checkout@v6

      - name: Install fypp + Homebrew GCC 14
        run: |
          brew install uv gcc@14
          uv tool install fypp

      - name: Configure
        run: |
          # MULTIFLOATS_USE_LTO=OFF / STRIP_SYMBOLS=OFF: keep parity
          # with the release workflow's non-LTO mac job so CI fails
          # on the same Mach-O surface (alias / weak-alias / etc).
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_Fortran_COMPILER=gfortran-14 \
            -DMULTIFLOATS_USE_LTO=OFF \
            -DMULTIFLOATS_STRIP_SYMBOLS=OFF \
            -DMULTIFLOATS_BUILD_BENCH=OFF

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(sysctl -n hw.ncpu)
